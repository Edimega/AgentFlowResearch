services:
  postgres:
    image: postgres:16-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow} -d ${POSTGRES_DB:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: agentflow-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentflow_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-minio-buckets:
    image: minio/mc:latest
    container_name: agentflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentflow_dev_password}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-agentflow-uploads}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS:-agentflow-reports}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null
        for bucket in "$$S3_BUCKET_UPLOADS" "$$S3_BUCKET_REPORTS"; do
          if mc ls "local/$$bucket" >/dev/null 2>&1; then
            echo "MinIO bucket already exists: $$bucket"
          else
            mc mb "local/$$bucket" >/dev/null
            echo "MinIO bucket created: $$bucket"
          fi
          mc anonymous set none "local/$$bucket" >/dev/null
          echo "MinIO bucket is private: $$bucket"
        done
        tail -f /dev/null
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mc ls \"local/$$S3_BUCKET_UPLOADS\" >/dev/null 2>&1 && mc ls \"local/$$S3_BUCKET_REPORTS\" >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: agentflow-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./docs/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
